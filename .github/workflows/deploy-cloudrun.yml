name: Deploy to Cloud Run

on:
  push:
    branches:
      - deploy

env:
  PROJECT_ID: husky-car
  REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/433856687458/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: github-actions-deployer@husky-car.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build backend image
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/litmatch/litmatch-backend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/litmatch/litmatch-backend:latest \
            .

      - name: Push backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/litmatch/litmatch-backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/litmatch/litmatch-backend:latest

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy litmatch-backend \
            --project ${{ env.PROJECT_ID }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/litmatch/litmatch-backend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8081 \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --set-env-vars "^||^DATABASE_URL=${{ secrets.DATABASE_URL }}||OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}||CHAT_MODEL=gpt-4o||EMBEDDING_MODEL=text-embedding-3-large||EMBEDDING_DIMENSIONS=3072" \
            --quiet

      - name: Get backend URL
        id: get-url
        run: |
          URL=$(gcloud run services describe litmatch-backend --project ${{ env.PROJECT_ID }} --region ${{ env.REGION }} --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

      - name: Update backend CORS with frontend URL
        run: |
          FRONTEND_URL=$(gcloud run services describe litmatch-frontend --project ${{ env.PROJECT_ID }} --region ${{ env.REGION }} --format 'value(status.url)' 2>/dev/null || echo "")
          BACKEND_URL=${{ steps.get-url.outputs.url }}
          CORS='["'"${BACKEND_URL}"'","'"${FRONTEND_URL}"'","http://localhost:5173","http://localhost:5169","capacitor://localhost","https://localhost"]'

          # Use ^ as delimiter so commas inside JSON don't break gcloud parsing
          gcloud run services update litmatch-backend \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --update-env-vars "^||^CORS_ORIGINS=${CORS}" \
            --quiet

  # ── Frontend ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/433856687458/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: github-actions-deployer@husky-car.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build frontend image
        working-directory: frontend
        run: |
          docker build \
            --build-arg VITE_API_BASE_URL=${{ needs.deploy-backend.outputs.url }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/litmatch/litmatch-frontend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/litmatch/litmatch-frontend:latest \
            .

      - name: Push frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/litmatch/litmatch-frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/litmatch/litmatch-frontend:latest

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy litmatch-frontend \
            --project ${{ env.PROJECT_ID }} \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/litmatch/litmatch-frontend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --quiet

      - name: Show deployed URLs
        run: |
          FRONTEND=$(gcloud run services describe litmatch-frontend --project ${{ env.PROJECT_ID }} --region ${{ env.REGION }} --format 'value(status.url)')
          BACKEND=${{ needs.deploy-backend.outputs.url }}
          echo "## Deployed to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend:** $FRONTEND" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend:** $BACKEND" >> $GITHUB_STEP_SUMMARY
